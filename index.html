<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@stewieogriffin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Fundo com Degradê Vermelho Escuro de Alta Qualidade */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4a0e17, #1a0508);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container Principal */
        .profile-container {
            text-align: center;
            max-width: 400px;
            width: 90%;
            padding: 30px 20px;
        }

        /* Foto de Perfil com Borda Amarela Vibrante (Logo Family Guy / Roupa Stewie) */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid #ffcc00;
            object-fit: cover;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.6);
            margin-bottom: 15px;
        }

        /* Nome em Branco de Alto Contraste */
        h1 {
            font-size: 26px;
            margin: 10px 0 5px 0;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Arroba em Amarelo para destacar */
        .username {
            font-size: 16px;
            color: #ffcc00;
            font-weight: 600;
            margin-bottom: 30px;
        }

        /* Container dos Botões */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Botões Sólidos e Escuros para Destacar no Fundo */
        .link-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 16px;
            text-decoration: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            background: #281115;
            border: 2px solid #ffcc00;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .link-button i {
            font-size: 22px;
        }

        /* Efeitos de Cores ao Passar o Mouse (Hover) */
        .instagram:hover {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            border-color: transparent;
            box-shadow: 0 0 20px rgba(220, 39, 67, 0.6);
            transform: scale(1.04);
        }

        .tiktok:hover {
            background: #000000;
            border-color: #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
            transform: scale(1.04);
        }

        .youtube:hover {
            background: #ff0000;
            border-color: transparent;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            transform: scale(1.04);
        }

        /* Rodapé */
        footer {
            margin-top: 45px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="https://images.weserv.nl/?url=www.instagram.com/stewieogriffin/picture/?size=large" alt="Stewie Griffin" class="profile-img">

        <h1>Stewie Griffin</h1>
        <div class="username">@stewieogriffin</div>

        <div class="links-container">
            
            <a href="https://www.instagram.com/stewieogriffin?igsh=MTE4dnFvdzJuYjZpOQ==" target="_blank" class="link-button instagram">
                <i class="fab fa-instagram"></i> Instagram
            </a>

            <a href="https://www.tiktok.com/@stewieogriffin" target="_blank" class="link-button tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>

            <a href="https://youtube.com/@stewiefamilyguyyy?si=90sbosjivQzCv8nk" target="_blank" class="link-button youtube">
                <i class="fab fa-youtube"></i> YouTube
            </a>

        </div>

        <footer>Segue Noix</footer>
    </div>

</body>
</html>
