<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>linktree.stewieogriffin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Fundo Amarelo Family Guy com padrão Pop Art de quadrinhos */
        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background-color: #ffcc00;
            background-image: radial-gradient(#e6b800 15%, transparent 16%),
                              radial-gradient(#e6b800 15%, transparent 16%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container Principal */
        .profile-container {
            text-align: center;
            max-width: 400px;
            width: 90%;
            padding: 40px 25px;
            background: #ffffff;
            border: 5px solid #000000;
            border-radius: 30px;
            box-shadow: 10px 10px 0px #000000; /* Sombra sólida estilo cartoon */
        }

        /* Foto de Perfil com contorno de desenho animado */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid #000000;
            object-fit: cover;
            box-shadow: 5px 5px 0px #ff3344;
            margin-bottom: 15px;
        }

        /* Nome em estilo Fonte de Quadrinhos/Logo */
        h1 {
            font-size: 32px;
            margin: 10px 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #000000;
            -webkit-text-stroke: 1px #000000;
        }

        /* Arroba em destaque */
        .username {
            font-family: 'Arial', sans-serif;
            font-size: 18px;
            color: #ff3344; /* Vermelho do Stewie */
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* Container dos Botões */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Botões Estilo Quadrinhos (Pop/Cartoon) */
        .link-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 16px;
            text-decoration: none;
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            border-radius: 15px;
            border: 4px solid #000000;
            text-shadow: 2px 2px 0px #000000;
            transition: all 0.2s ease;
        }

        .link-button i {
            font-size: 24px;
        }

        /* Cores base dos botões (Paleta Stewie/Family Guy) */
        .instagram {
            background-color: #ff3344; /* Vermelho Stewie */
            box-shadow: 5px 5px 0px #000000;
        }

        .tiktok {
            background-color: #00bfff; /* Azul clássico de fundo */
            box-shadow: 5px 5px 0px #000000;
        }

        .youtube {
            background-color: #000000; /* Preto para dar contraste */
            box-shadow: 5px 5px 0px #ff3344;
        }

        /* --- EFEITOS HOVER DINÂMICOS (MUDANÇA DE COR AO PASSAR O MOUSE) --- */

        /* HOVER INSTAGRAM */
        .instagram:hover {
            background-color: #000000; /* Fundo preto para destacar o neon */
            border-color: #e1306c; /* Borda Rosa Insta */
            box-shadow: 7px 7px 0px #e1306c;
            transform: translate(-2px, -2px);
        }
        .instagram:hover i, .instagram:hover {
            color: #e1306c !important; /* Logo e texto Rosa Insta */
        }

        /* HOVER TIKTOK */
        .tiktok:hover {
            background-color: #000000; /* Fundo preto */
            border-color: #00f2fe; /* Borda Ciano TikTok */
            box-shadow: 7px 7px 0px #fe2c55; /* Sombra Rosa TikTok (Efeito Glitch) */
            transform: translate(-2px, -2px);
        }
        .tiktok:hover i, .tiktok:hover {
            color: #00f2fe !important; /* Logo e texto Ciano TikTok */
        }

        /* HOVER YOUTUBE */
        .youtube:hover {
            background-color: #000000; 
            border-color: #ff0000; /* Borda Vermelha */
            box-shadow: 7px 7px 0px #ff0000;
            transform: translate(-2px, -2px);
        }
        .youtube:hover i, .youtube:hover {
            color: #ff0000 !important; /* Logo e texto Vermelho YouTube */
        }

        /* Rodapé */
        footer {
            font-family: 'Arial', sans-serif;
            margin-top: 35px;
            font-size: 14px;
            color: #000000;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="Perfil.png" alt="Stewie Griffin" class="profile-img">

        <h1>Stewie Griffin</h1>
        <div class="username">@stewieogriffin</div>

        <div class="links-container">
            
            <a href="https://www.instagram.com/stewieogriffin?igsh=MTE4dnFvdzJuYjZpOQ==" target="_blank" class="link-button instagram">
                <i class="fab fa-instagram"></i> INSTAGRAM
            </a>

            <a href="https://www.tiktok.com/@stewieogriffin" target="_blank" class="link-button tiktok">
                <i class="fab fa-tiktok"></i> TIKTOK
            </a>

            <a href="https://youtube.com/@stewiefamilyguyyy?si=90sbosjivQzCv8nk" target="_blank" class="link-button youtube">
                <i class="fab fa-youtube"></i> YOUTUBE
            </a>

        </div>

        <footer>Siga para mais planos de dominação mundial!</footer>
    </div>

</body>
</html>
