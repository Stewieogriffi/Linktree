<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos Globais / Fundo */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c1b, #241442, #0f0c1b);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container Principal */
        .profile-container {
            text-align: center;
            max-width: 400px;
            width: 90%;
            padding: 30px 20px;
        }

        /* Foto de Perfil */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ff007f;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5);
            margin-bottom: 15px;
        }

        /* Nome e @ */
        h1 {
            font-size: 24px;
            margin: 10px 0 5px 0;
            font-weight: 700;
        }

        .username {
            font-size: 16px;
            color: #a19da9;
            margin-bottom: 25px;
        }

        /* Container dos Botões */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Estilo dos Botões (Links) */
        .link-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 16px;
            text-decoration: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .link-button i {
            font-size: 20px;
        }

        /* Efeitos de Passar o Mouse (Hover) específicos para cada rede */
        .instagram:hover {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            border-color: transparent;
            box-shadow: 0 0 15px rgba(220, 39, 67, 0.5);
            transform: scale(1.03);
        }

        .tiktok:hover {
            background: #000000;
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
            transform: scale(1.03);
        }

        .youtube:hover {
            background: #ff0000;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            transform: scale(1.03);
        }

        /* Rodapé */
        footer {
            margin-top: 40px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="profile-container">
       <img src="Perfil.png" alt="Sua Foto" class="profile-img">

        <h1>Stewie Griffin</h1>
        <div class="username">@stewieogriffin</div>

        <div class="links-container">
            
           <a href="https://www.instagram.com/stewieogriffin?igsh=MTE4dnFvdzJuYjZpOQ==" target="_blank" class="link-button instagram">
                <i class="fab fa-instagram"></i> Instagram
            </a>

           <a href="https://www.tiktok.com/@stewieogriffin" target="_blank" class="link-button tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>

          <a href="https://youtube.com/@stewiefamilyguyyy?si=90sbosjivQzCv8nk" target="_blank" class="link-button youtube">
                <i class="fab fa-youtube"></i> YouTube
            </a>

        </div>

        <footer>Segue Noix</footer>
    </div>

</body>
</html>
